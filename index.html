<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urlott Creator</title>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
  }
  body {
    background: #000;
    color: #fff;
    text-align: center;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #8b00ff, #ff00c8);
    padding: 22px 20px;
    box-shadow: 0 4px 20px rgba(139, 0, 255, 0.5);
  }
  .typewriter {
    font-size: 18px;
    font-weight: 700;
    text-shadow: 0 0 8px rgba(255,255,255,0.6);
    letter-spacing: 1px;
    display: inline-block;
  }
  .typewriter span {
    border-right: 2px solid #fff; 
    white-space: nowrap;
    overflow: hidden;
    animation: typing 2s steps(12) 0s infinite alternate, blink .7s step-end infinite;
  }
  @keyframes typing {
    0% { width: 0 }
    50% { width: 12ch } 
    70% { width: 12ch } 
    100% { width: 0 } 
  }
  @keyframes blink {
    50% { border-color: transparent }
  }
  .container {
    padding: 30px 20px;
  }
  .profile-pic {
    width: 110px;
    height: 110px;
    border-radius: 50%; 
    border: 3px solid #a855f7;
    box-shadow: 0 0 20px #a855f7;
    object-fit: cover; 
    margin-bottom: 16px;
  }
  .name {
    font-size: 18px;
    font-weight: 700;
    color: #c084fc;
    margin-bottom: 8px;
    text-shadow: 0 0 8px #a855f7;
  }
  .bio {
    font-size: 12px;
    color: #ccc;
    max-width: 280px;
    margin: 0 auto 20px auto;
    line-height: 1.5;
  }
  .socials {
    display: flex;
    justify-content: center;
    gap: 16px;
  }
  .socials a {
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
    border-radius: 50%;
    transition: 0.3s;
  }
  .socials a:hover {
    transform: scale(1.1);
    box-shadow: 0 0 15px #a855f7;
  }
  .socials svg {
    width: 20px;
    height: 20px;
    fill: #fff;
  }
  footer {
    margin-top: 30px;
    font-size: 10px;
    color: #666;
    padding-bottom: 20px;
  }
</style>
</head>
<body>

  <header>
    <h1 class="typewriter"><span>WELCOME GUYS</span></h1>
  </header>

  <div class="container">
    
    <img src="https://raw.githubusercontent.com/MagicxKiller/Profile/refs/heads/main/snaptik_7527193836662033720_4_v2.jpeg" alt="Profile" class="profile-pic">
    
    <div class="name">Urlott Creator</div>
    
    <p class="bio"></p>

    <div class="socials">
      
      <a href="https://tiktok.com/@its_.markii" target="_blank" aria-label="TikTok">
        <svg viewBox="0 0 24 24"><path d="M12.5 2.0h2.9c.1 1.9 1.3 3.6 3.3 4.3v3.2c-1.2 0-2.3-.4-3.3-1.1v6.7c0 4.1-3.3 7.4-7.4 7.4S0.6 19.2 0.6 15.1 3.9 7.7 8 7.7v3.2c-2.3 0-4.2 1.9-4.2 4.2s1.9 4.2 4.2 4.2 4.2-1.9 4.2-4.2V2.0z"/></svg>
      </a>

      
      <a href="https://www.instagram.com/its._markii?igsh=Ym5ib2trdzl4YWho" target="_blank" aria-label="Instagram">
        <svg viewBox="0 0 24 24"><path d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 0 5-2.2 5-5V7c0-2.8-2.2-5-5-5H7zm10 2c1.7 0 3 1.3 3 3v10c0 1.7-1.3 3-3 3H7c-1.7 0-3-1.3-3-3V7c0-1.7 1.3-3 3-3h10zm-5 2a5 5 0 100 10 5 5 0 000-10zm0 2a3 3 0 110 6 3 3 0 010-6zm6.5-1a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0z"/></svg>
      </a>
    </div>
  </div>

  <footer>
    ©2026 Gaming website
  </footer>

</body>
</html>
